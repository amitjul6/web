name: Deploy Web Preview

# Builds the Flutter web app and publishes it to GitHub Pages so you can see
# the latest look-and-feel at https://<user>.github.io/web/ — no local server.
# One-time setup: repo Settings → Pages → Source = "GitHub Actions".
on:
  push:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      # base-href matches the repo name so assets resolve on Pages.
      - run: flutter build web --release --base-href "/web/"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
