name: Build Android APK

# Builds an installable APK in the cloud and publishes it to a GitHub Release
# so it can be downloaded straight onto a phone (no login, no unzip) from:
#   https://github.com/amitjul6/web/releases/download/android-latest/app-release.apk
on:
  push:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: write   # needed to create/update the Release

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Build release APK
        # Default Flutter template signs release with the debug key, so this
        # APK installs directly on a phone for testing.
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: caloriedesi-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Publish APK to a downloadable Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: CalorieDesi — latest APK
          body: |
            Latest test build of CalorieDesi (debug-signed).
            On your phone, tap **app-release.apk** below to install.
          files: build/app/outputs/flutter-apk/app-release.apk
          make_latest: true
