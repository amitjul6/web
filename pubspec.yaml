name: caloriedesi
description: "CalorieDesi — Indian food & activity calorie tracker."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.35.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.0

  # Local-first persistence
  hive_ce: ^2.0.0
  hive_ce_flutter: ^2.0.0
  shared_preferences: ^2.2.0

  # Activity / sensors
  pedometer: ^4.0.0
  permission_handler: ^11.0.0
  health: ^11.0.0

  # Auth
  google_sign_in: ^6.2.0

  # Charts & misc
  fl_chart: ^0.69.0
  intl: ^0.19.0
  uuid: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
